<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>OpenCode — Cockpit</title>
<style>
:root {
  --bg: #0d1117; --surface: #161b22; --border: #30363d;
  --text: #c9d1d9; --muted: #8b949e; --green: #3fb950;
  --red: #da3633; --yellow: #d29922; --blue: #58a6ff;
  --accent: #1f6feb; --radius: 8px;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', 'JetBrains Mono', monospace;
  background: var(--bg); color: var(--text); min-height: 100vh; padding: 24px;
}
header { display: flex; align-items: center; justify-content: space-between; padding-bottom: 20px; border-bottom: 1px solid var(--border); margin-bottom: 24px; }
header h1 { font-size: 20px; font-weight: 600; letter-spacing: -0.5px; }
header .version { color: var(--muted); font-size: 13px; }
.actions { display: flex; gap: 10px; }
button { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: var(--radius); cursor: pointer; font-family: inherit; font-size: 13px; transition: all 0.15s; }
button:hover { border-color: var(--blue); color: var(--blue); }
button:active { background: var(--accent); color: #fff; }
.grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 16px; }
.card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; position: relative; }
.card h3 { font-size: 15px; margin-bottom: 12px; color: var(--blue); }
.card .dot { display: inline-block; width: 10px; height: 10px; border-radius: 50%; margin-right: 8px; }
.card .dot.green { background: var(--green); box-shadow: 0 0 6px var(--green); }
.card .dot.red { background: var(--red); box-shadow: 0 0 6px var(--red); }
.card .dot.gray { background: var(--muted); }
.card .row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; font-size: 13px; }
.card .row .label { color: var(--muted); }
.card .row .value { font-weight: 500; }
.section-title { font-size: 16px; color: var(--muted); margin: 28px 0 12px; text-transform: uppercase; letter-spacing: 1px; }
.plugin-item { display: flex; align-items: center; justify-content: space-between; padding: 12px 16px; border: 1px solid var(--border); border-radius: var(--radius); margin-bottom: 8px; background: var(--surface); }
.plugin-item .name { font-size: 14px; font-weight: 500; }
.plugin-item .tier { font-size: 11px; color: var(--muted); text-transform: uppercase; margin-left: 10px; }
.toggle { position: relative; display: inline-block; width: 44px; height: 24px; }
.toggle input { opacity: 0; width: 0; height: 0; }
.toggle .slider { position: absolute; cursor: pointer; top: 0; left: 0; right: 0; bottom: 0; background: var(--border); border-radius: 24px; transition: 0.2s; }
.toggle .slider:before { content: ""; position: absolute; height: 18px; width: 18px; left: 3px; bottom: 3px; background: var(--text); border-radius: 50%; transition: 0.2s; }
.toggle input:checked + .slider { background: var(--green); }
.toggle input:checked + .slider:before { transform: translateX(20px); }
.spinner { display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--blue); border-radius: 50%; animation: spin 0.6s linear infinite; margin-right: 8px; }
@keyframes spin { to { transform: rotate(360deg); } }
.error { color: var(--red); padding: 12px; border: 1px solid var(--red); border-radius: var(--radius); }
.infra-badge { padding: 3px 10px; border-radius: 12px; font-size: 11px; font-weight: 600; text-transform: uppercase; }
.infra-badge.running { background: rgba(63,185,80,0.15); color: var(--green); }
.infra-badge.exited { background: rgba(210,153,34,0.15); color: var(--yellow); }
.infra-badge.stopped { background: rgba(218,54,51,0.15); color: var(--red); }
.timestamp { color: var(--muted); font-size: 11px; text-align: right; margin-top: 20px; }
</style>
</head>
<body>
<header>
  <div><h1>OpenCode Cockpit</h1><span class="version" id="version">loading</span></div>
  <div class="actions"><button onclick="refreshAll()" id="refreshBtn"><span id="refreshSpinner" style="display:none" class="spinner"></span>Refresh</button></div>
</header>
<div class="section-title">Infrastructure Services</div>
<div class="grid" id="infraGrid"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="section-title">Systemd Services</div>
<div class="grid" id="systemdGrid"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="section-title">Docker Containers</div>
<div class="grid" id="dockerGrid"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="section-title">Sessions</div>
<div class="grid" id="sessionsGrid"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="section-title">GPU</div>
<div class="grid" id="gpuGrid"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="section-title">System Metrics</div>
<div class="grid" id="metricsGrid"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="section-title">Plugins</div>
<div id="pluginsList"><div class="card"><span class="spinner"></span> Loading</div></div>
<div class="timestamp" id="timestamp"></div>
<div id="errorBox"></div>
<script>
var API='/api';
async function fetchJSON(u,o){var r=await fetch(u,o);if(!r.ok)throw new Error(r.status+' '+r.statusText);return r.json()}
function dot(r){if(r===true)return'<span class="dot green"></span>';if(r===false)return'<span class="dot red"></span>';return'<span class="dot gray"></span>'}
function badge(s){var c=s==='running'||s==='active'?'running':s==='exited'?'exited':'stopped';return'<span class="infra-badge '+c+'">'+(s||'unknown')+'</span>'}
function renderInfra(d){var g=document.getElementById('infraGrid');if(d.error){g.innerHTML='<div class="card"><span class="dot gray"></span> '+d.error+'</div>';return}var sv=d.services||[];if(sv.length===0){g.innerHTML='<div class="card"><span class="dot gray"></span> No infra services</div>';return}g.innerHTML=sv.map(function(s){return'<div class="card"><h3>'+dot(s.State==='running')+(s.Name||s.Service||s.raw)+'</h3><div class="row"><span class="label">State</span><span class="value">'+badge(s.State)+'</span></div>'+(s.Image?'<div class="row"><span class="label">Image</span><span class="value" style="font-size:11px;color:var(--muted)">'+s.Image+'</span></div>':'')+'</div>'}).join('')}
function renderSystemd(d){var g=document.getElementById('systemdGrid');var e=Object.entries(d||{});if(e.length===0){g.innerHTML='<div class="card"><span class="dot gray"></span> No services tracked</div>';return}g.innerHTML=e.map(function(e){return'<div class="card"><h3>'+dot(e[1].running)+e[0]+'</h3><div class="row"><span class="label">State</span><span class="value">'+badge(e[1].state)+'</span></div></div>'}).join('')}
function renderDocker(d){var g=document.getElementById('dockerGrid');var e=Object.entries(d||{});if(e.length===0){g.innerHTML='<div class="card"><span class="dot gray"></span> No containers running</div>';return}g.innerHTML=e.map(function(e){return'<div class="card"><h3>'+dot(e[1].running)+e[0]+'</h3><div class="row"><span class="label">State</span><span class="value">'+badge(e[1].state)+'</span></div>'+(e[1].image?'<div class="row"><span class="label">Image</span><span class="value" style="font-size:11px;color:var(--muted)">'+e[1].image+'</span></div>':'')+'</div>'}).join('')}
function renderPlugins(d){var el=document.getElementById('pluginsList');if(d.error){el.innerHTML='<div class="card"><span class="dot gray"></span> '+d.error+'</div>';return}var p=d.plugins||{};var t=p.tiers||{};var h='';Object.entries(t).forEach(function(e){var ti=e[0],it=e[1];h+='<div class="section-title" style="font-size:12px;margin-top:16px">'+ti.toUpperCase()+'</div>';var l=Array.isArray(it)?it.map(function(n){return{name:n,enabled:true}}):Object.entries(it).map(function(e2){return{name:e2[0],enabled:e2[1].enabled!==false,tier:ti,depends:e2[1].depends||[]}});h+=l.map(function(p){return'<div class="plugin-item"><div><span class="name">'+p.name+'</span><span class="tier">'+ti+'</span>'+(p.depends&&p.depends.length?'<span style="font-size:10px;color:var(--muted)"> deps: '+p.depends.join(', ')+'</span>':'')+'</div><label class="toggle"><input type="checkbox" '+(p.enabled?'checked':'')+' disabled><span class="slider"></span></label></div>'}).join('')});if(!h)h='<div class="card"><span class="dot gray"></span> No plugins configured</div>';el.innerHTML=h}
function renderSessions(d){var g=document.getElementById('sessionsGrid');if(d.error){g.innerHTML='<div class="card"><span class="dot gray"></span> '+d.error+'</div>';return}var sv=d.sessions||[];if(sv.length===0){g.innerHTML='<div class="card"><span class="dot gray"></span> No sessions found</div>';return}g.innerHTML=sv.map(function(s){return'<div class="card"><h3><span class="dot green"></span>'+s.name+'</h3><div class="row"><span class="label">Modified</span><span class="value">'+s.mtime+'</span></div><div class="row"><span class="label">Age</span><span class="value">'+s.age+'</span></div></div>'}).join('')}
function renderGPU(d){var g=document.getElementById('gpuGrid');if(d.error){g.innerHTML='<div class="card"><span class="dot gray"></span> '+d.error+'</div>';return}var h='';if(d.nvidia)h+='<div class="card"><h3><span class="dot green"></span>NVIDIA GPU</h3><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;margin-top:8px">'+d.nvidia+'</pre></div>';if(d.ollama)h+='<div class="card"><h3><span class="dot green"></span>Ollama Models</h3><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;margin-top:8px">'+d.ollama+'</pre></div>';g.innerHTML=h||'<div class="card"><span class="dot gray"></span> No GPU/ollama data</div>'}
function renderMetrics(d){var g=document.getElementById('metricsGrid');if(d.memory)g.innerHTML='<div class="card"><h3>Memory</h3><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;margin-top:8px">'+d.memory+'</pre></div>';if(d.disk)g.innerHTML+='<div class="card"><h3>Disk</h3><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;margin-top:8px">'+d.disk+'</pre></div>';if(d.uptime)g.innerHTML+='<div class="card"><h3>Uptime</h3><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;margin-top:8px">'+d.uptime+'</pre></div>';if(d.load)g.innerHTML+='<div class="card"><h3>Load Average</h3><pre style="font-size:11px;color:var(--muted);white-space:pre-wrap;margin-top:8px">'+d.load+'</pre></div>'}
function setRefreshing(v){document.getElementById('refreshSpinner').style.display=v?'inline-block':'none';document.getElementById('refreshBtn').disabled=v}
async function refreshAll(){setRefreshing(true);document.getElementById('errorBox').innerHTML='';try{var s=await fetchJSON(API+'/status');document.getElementById('version').textContent='v'+(s.version||'?');document.getElementById('timestamp').textContent='Last update: '+new Date(s.timestamp).toLocaleString();renderSystemd(s.systemd);renderDocker(s.docker);var inf=await fetchJSON(API+'/infra');renderInfra(inf);var ss=await fetchJSON(API+'/sessions');renderSessions(ss);var gp=await fetchJSON(API+'/gpu');renderGPU(gp);var mt=await fetchJSON(API+'/metrics');renderMetrics(mt);var pl=await fetchJSON(API+'/plugins');renderPlugins(pl)}catch(e){document.getElementById('errorBox').innerHTML='<div class="error">API error: '+e.message+' - is GUI server running on port 4200?</div>'}setRefreshing(false)}
refreshAll();
</script>
</body>
</html>
