name: Tests
on: [push, pull_request]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Syntax check
        run: |
          for f in setup.sh dev.sh lib/*.sh modes/*.sh; do
            bash -n "$f" || exit 1
          done
      - name: Unit tests
        run: bash tests/run_tests.sh
      - name: ShellCheck
        uses: ludeeus/action-shellcheck@2.0.0
        with:
          scandir: '.'
          severity: warning
          ignore_paths: 'v*.sh'
        env:
          SHELLCHECK_OPTS: -x
