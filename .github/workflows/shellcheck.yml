name: ShellCheck + shfmt
on:
  push:
    branches: [main]
    paths:
      - '**.sh'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: '.'
          format: tty
  shfmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run shfmt
        uses: docker://mvdan/shfmt:latest
        with:
          args: -d -i 2 -ci -- src/lib/01-system.sh src/lib/02-docker.sh src/lib/03-chrome.sh src/lib/04-zsh.sh src/lib/05-java.sh src/lib/06-node.sh src/lib/07-python.sh src/lib/08-go.sh src/lib/09-rust.sh src/lib/10-dotnet.sh src/lib/11-opencode.sh src/lib/12-mcp-lsp.sh src/lib/13-chromadb.sh src/lib/14-shokunin.sh src/lib/15-security.sh src/lib/16-llm.sh src/lib/17-project.sh src/lib/18-opencode-json.sh src/lib/19-finalize.sh src/lib/20-autoupdate.sh src/lib/21-rag.sh src/lib/22-webui-service.sh src/lib/23-just.sh src/lib/24-websearch.sh src/lib/25-litellm.sh src/lib/26-providers.sh src/lib/27-dotfiles.sh src/lib/28-devbox.sh src/lib/29-mise.sh src/lib/30-infra.sh src/lib/31-cockpit.sh src/lib/32-isolated.sh src/lib/34-observability.sh src/lib/35-gui.sh src/lib/36-model-router.sh src/lib/helpers.sh src/lib/pre-session-check.sh src/lib/version-check.sh setup.sh dev.sh
