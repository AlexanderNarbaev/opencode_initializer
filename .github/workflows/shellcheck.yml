name: ShellCheck + shfmt
on:
  push:
    branches: [main]
    paths:
      - '**.sh'
  pull_request:
    branches: [main]
    paths:
      - '**.sh'
jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          severity: error
          scandir: '.'
          format: tty
  shfmt:
    runs-on: ubuntu-latest
    if: false  # Disabled: shfmt breaks associative array keys with hyphens (00-core.sh)
    steps:
      - uses: actions/checkout@v4
      - name: Run shfmt
        uses: docker://mvdan/shfmt:latest
        with:
          args: -d -i 2 -ci .
