site_name: OpenCode Initializer
site_description: Universal Dev Machine Bootstrap v2.0.0 — one-command AI-enhanced development environment with 39 modules, 24 providers, 24 MCPs, 15 plugins, 13 LSPs, model routing, Infrastructure as Code, Web GUI
site_author: Alexander Narbaev
site_url: https://alexandernarbaev.github.io/opencode_initializer/
copyright: "&copy; 2025-2026 Alexander Narbaev. MIT License."

repo_name: AlexanderNarbaev/opencode_initializer
repo_url: https://github.com/AlexanderNarbaev/opencode_initializer
edit_uri: edit/main/docs/

theme:
  name: material
  logo: assets/logo.svg
  favicon: assets/favicon.svg
  font:
    text: Inter
    code: JetBrains Mono
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - search.suggest
    - search.highlight
    - search.share
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - toc.follow
    - header.autohide
  icon:
    repo: fontawesome/brands/github
  language: en

extra_css:
  - stylesheets/extra.css

extra_javascript:
  - javascripts/extra.js

plugins:
  - search:
      lang:
        - en
        - ru
  - i18n:
      docs_structure: suffix
      fallback_to_default: true
      reconfigure_material: true
      languages:
        - locale: en
          name: English
          default: true
          build: true
        - locale: ru
          name: Русский
          build: true
  - social:
      cards: true
      cards_layout: default
      cards_layout_options:
        background_color: "#4051b5"
        color: "#ffffff"
        font_family: Inter
  - blog:
      blog_dir: changelog
      blog_toc: true
      post_date_format: long
      archive: false
  - tags
  - git-revision-date-localized:
      enable_creation_date: true
      type: date
  - minify:
      minify_html: true
      minify_js: true
      minify_css: true
      htmlmin_opts:
        remove_comments: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.caret
  - pymdownx.mark
  - pymdownx.tilde
  - toc:
      permalink: true
  - attr_list
  - md_in_html
  - footnotes
  - def_list

nav:
  - Home: index.md
  - Getting Started: getting-started/index.md
  - User Guide: user-guide/index.md
  - Advanced Guide: advanced/index.md
  - Architecture: architecture/index.md
  - Reference:
      - reference/index.md
      - MCP, LSP & Plugins: reference/mcp-lsp-plugins.md
  - Guides:
      - Team Setup: guides/team-setup.md
  - Changelog: changelog/index.md
  - Tags: tags.md
  - Contributing: contributing/index.md
  - FAQ: faq/index.md

extra:
  analytics: {}
  generator: false
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/AlexanderNarbaev/opencode_initializer
      name: GitHub
    - icon: fontawesome/brands/git-alt
      link: https://gitverse.ru/AlexandrNarbaev/opencode_initializer
      name: GitVerse
  alternate:
    - name: English
      link: /opencode_initializer/
      lang: en
    - name: Русский
      link: /opencode_initializer/ru/
      lang: ru
